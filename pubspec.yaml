name: mpsight
description: "MPSight - Computer Vision-Based Mpox Lesion Detection and Severity Assessment System"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera functionality
  camera: ^0.10.5+5
  
  # TensorFlow Lite for model inference
  tflite_flutter: ^0.11.0
  
  # Image processing
  image: ^4.1.3
  
  # Charts for visualization
  fl_chart: ^0.65.0
  
  # State management
  provider: ^6.1.1
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Image picker for gallery
  image_picker: ^1.0.4
  
  # Path provider for local storage
  path_provider: ^2.1.1
  
  # Animations
  flutter_animate: ^4.3.0
  
  # SVG support for vector icons
  flutter_svg: ^2.0.9
  
  # Material Design
  cupertino_icons: ^1.0.6
  
  # Privacy & Security
  crypto: ^3.0.3
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # UUID generation
  uuid: ^4.2.1
  
  # Date formatting
  intl: ^0.18.1
  google_fonts: ^8.0.2
  animations: ^2.1.2
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
